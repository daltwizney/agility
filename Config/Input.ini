; Plugin-shipped input mappings. Merged additively into the host project's
; [/Script/Engine.InputSettings] at engine startup — does not replace any of
; the host's existing mappings.
;
; File must be named "Input.ini" (no "Default" prefix) — UE's plugin-config
; loader uses GPluginModificationLayers ({PLUGIN}/Config/{TYPE}.ini) to inject
; into the project's existing config branches. A "DefaultInput.ini" here would
; be loaded into a plugin-private "DefaultInput" branch that nothing reads.
;
; Action names are namespaced (Agility.<Feature>.<Action>) so they group under
; an "Agility" subtree in Project Settings → Input and can't collide with the
; host project's own action names.

[/Script/Engine.InputSettings]
+ActionMappings=(ActionName="Agility.FlappyBird.Flap",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=SpaceBar)
+ActionMappings=(ActionName="Agility.FlappyBird.Flap",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=LeftMouseButton)
